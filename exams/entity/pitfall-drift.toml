# Round 2: SKILL.md as conversation content (not system prompt)
#
# Hypothesis: system-prompt SKILL.md is always accessible regardless
# of drift. Moving it to a tool result in the conversation body makes
# it susceptible to being pushed out of active attention.
#
# Also: agent self-classifies the DLQ as a "quick chore, boilerplate"
# during its suggestion, and user confirms that framing.

