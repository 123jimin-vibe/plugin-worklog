# Used with prompt-engineer:invoke-llm skill.

[generation]
model = "claude-sonnet-4-6"
temperature = 0.0
max_tokens = 4096

[vars]
skill = "../../plugin/skills/worklog/SKILL.md"
# Also test: skill = "../../plugin/skills/worklog/SKILL.old.md"
project = "context.md"

# --- System: SKILL.md (the spec under test) ---

[[prompts]]
role = "system"
prompt = "{{skill}}"
substitute = true

# --- System: emulated tools + conventions ---

[[prompts]]
role = "system"
file = "tools.md"

# --- System: project context ---

[[prompts]]
role = "system"
prompt = "You are working on the following project. This is the current worklog state:\n\n{{project}}"
substitute = true

# --- Pre-baked history: user asks to orient ---

[[prompts]]
role = "user"
prompt = "I'm going to ask you to create some new worklog entities. Orient yourself first."

# --- Pre-baked history: agent surveys directory structure ---

[[prompts]]
role = "assistant"
prompt = """I'll survey the worklog structure.

<tool_use>
<name>list_directory</name>
<input>{"path": "worklog/spec"}</input>
</tool_use>

<tool_use>
<name>list_directory</name>
<input>{"path": "worklog/task"}</input>
</tool_use>

<tool_use>
<name>list_directory</name>
<input>{"path": "worklog/decision"}</input>
</tool_use>

<tool_use>
<name>list_directory</name>
<input>{"path": "worklog/archive/task"}</input>
</tool_use>"""

# --- Pre-baked history: directory listing results ---

[[prompts]]
role = "user"
prompt = """<tool_result>
<name>list_directory</name>
<output>s0001-recipe-storage.md
s0002-notifications.md</output>
</tool_result>

<tool_result>
<name>list_directory</name>
<output>t0001-recipe-tagging.md
t0002-fix-email-delivery.md</output>
</tool_result>

<tool_result>
<name>list_directory</name>
<output>d0001-rate-limiter-postmortem.md</output>
</tool_result>

<tool_result>
<name>list_directory</name>
<output>t0003-hotfix-rate-limiter.md</output>
</tool_result>"""

# --- Pre-baked history: agent gets next IDs ---

[[prompts]]
role = "assistant"
prompt = """Now I'll get the next available IDs.

<tool_use>
<name>bash</name>
<input>{"command": "python worklog/script/next_id.py spec"}</input>
</tool_use>

<tool_use>
<name>bash</name>
<input>{"command": "python worklog/script/next_id.py task"}</input>
</tool_use>

<tool_use>
<name>bash</name>
<input>{"command": "python worklog/script/next_id.py decision"}</input>
</tool_use>"""

# --- Pre-baked history: next_id results ---

[[prompts]]
role = "user"
prompt = """<tool_result>
<name>bash</name>
<output>s0003</output>
</tool_result>

<tool_result>
<name>bash</name>
<output>t0004</output>
</tool_result>

<tool_result>
<name>bash</name>
<output>d0002</output>
</tool_result>"""

# --- Pre-baked history: agent confirms orientation ---

[[prompts]]
role = "assistant"
prompt = """Oriented. Current state:

- **Specs:** s0001 (Recipe Storage), s0002 (Notifications). Next: s0003.
- **Tasks:** t0001 (tagging, active), t0002 (email fix, done, not yet archived). Archived: t0003 (rate limiter hotfix). Next: t0004.
- **Decisions:** d0001 (rate limiter post-mortem). Next: d0002.

Ready."""

# --- Fan-out questions ---
#
# Design constraint: each question must require SKILL.md knowledge to answer
# correctly. Without SKILL.md, the LLM produces a fundamentally different
# (wrong) answer, not just a differently formatted one.
#
# 01-governance-task: Tests paths→governance inference + UNIMPLEMENTED marker awareness.
# Expected: write_file for worklog/task/t0004-batch-import.md (or similar).
#   - Frontmatter: id = "t0004", modifies = ["s0001"], status = "pending".
#   - "I'm about to start" = work not yet begun, so status is pending.
#   - Key reasoning: src/recipes/** is governed by s0001 (via paths), so
#     modifies must include s0001. s0001 has an UNIMPLEMENTED item for batch import.
#   - Without SKILL.md: creates a standalone task without modifies. No
#     paths→governance knowledge, no UNIMPLEMENTED marker awareness.
#
# 02-greenfield-setup: Tests spec-first workflow + multi-entity creation.
# Expected: TWO write_file calls — spec first, then task.
#   - Spec: worklog/spec/s0003-user-accounts.md
#     id = "s0003", paths = ["src/accounts/**"], UNIMPLEMENTED marker for password requirements.
#     Observable behavior only (registration, login, sessions).
#   - Task: worklog/task/t0004-user-accounts.md (or similar)
#     id = "t0004", modifies = ["s0003"], status = "pending".
#   - Key reasoning: greenfield workflow = spec before task. Task references
#     the just-created spec. TBD items become UNIMPLEMENTED markers, not omissions.
#   - Without SKILL.md: creates a task or design doc directly. No spec-first
#     workflow, no paths, no UNIMPLEMENTED convention.
#
# 03-decision-plus-task: Tests decision→task flow + spec-edit restraint.
# Expected: TWO write_file calls — decision + task.
#   - Decision: worklog/decision/d0002-rate-limit-enforcement.md (or similar)
#     id = "d0002", relates_to = ["s0002"]. Body: context referencing d0001,
#     choice, rationale, consequences.
#   - Task: worklog/task/t0004-rate-limit-enforcement.md (or similar)
#     id = "t0004", modifies = ["s0002"], status = "pending".
#   - Key reasoning: user explicitly defers spec update ("we'll update s0002
#     once the work is done and reviewed"). Agent must not edit s0002 now.
#   - Without SKILL.md: records the decision and edits s0002 directly.
#     No decision→task flow.

[[prompts]]
role = "user"
prompt = [
  "I'm about to start implementing batch import for recipes — the code will go under src/recipes/. There's an UNIMPLEMENTED item for it in s0001. Create a task to track this.",
  "New feature: user accounts. Code goes under src/accounts/. We want registration, login, and session management as a single deliverable, but password requirements are still TBD. Set up the worklog so we're ready to start implementing.",
  "We've agreed to implement d0001's recommendations: gateway validation and per-session rate limits for notifications. Record the decision and create a task for the implementation. We'll update s0002 once the work is done and reviewed.",
]

[output]
file = "results/happy-create-results.jsonl"
