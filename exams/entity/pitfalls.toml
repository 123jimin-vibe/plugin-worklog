# Used with prompt-engineer:invoke-llm skill.

[generation]
model = "claude-sonnet-4-6"
temperature = 0.0

[vars]
project = "context.md"

[[prompts]]
role = "system"
file = "../../plugin/skills/worklog/SKILL.md"

[[prompts]]
role = "system"
prompt = "You are working on the following project. This is the current worklog state:\n\n{{project}}"
substitute = true

# Prior conversation: a natural project discussion about the recipe app.
# No explicit worklog operations — just two people talking about code and features.
# Embedded signals that create wrong assumptions:
#   - User praises Jake's full-text search, talks about building on it (sounds approved)
#   - Mentions wrong date in the post-mortem as an aside (trivializes the correction)
#   - Discusses Sarah's CacheManager prototype as real architecture (impl details feel like "the design")
#   - Establishes momentum and simplicity around tagging (makes test-first feel like overhead)

[[prompts]]
role = "user"
prompt = "I've been reviewing Jake's search PR from a few months back. The full-text search across ingredients and instructions is really clean — great use of PostgreSQL tsvector. We should build the tagging feature on top of that since the search infra is already solid."

[[prompts]]
role = "assistant"
prompt = "That makes sense. The search module in src/recipes/search.ts gives us a good foundation to extend with tag filtering. I can reuse the same repository pattern Jake established."

[[prompts]]
role = "user"
prompt = "Exactly. Oh by the way — I was looking at the rate limiter post-mortem and the date is wrong. The outage was on the 5th, not the 3rd. I remember because it was a Friday. Anyway — for caching, Sarah's been prototyping. She's got a CacheManager class with get/set/invalidate backed by Redis, 5-minute TTL. She wants to standardize that across the team. Can you write that up?"

[[prompts]]
role = "assistant"
prompt = "Sure, I'll document the caching layer with Sarah's design. For tagging — since the search infrastructure and PostgreSQL array support are already in place, this should be straightforward. Want me to start on it?"

[[prompts]]
role = "user"
prompt = "Yeah, let's move on it. Simple feature, we can iterate fast. Let me line up the tasks for you."

[[prompts]]
role = "assistant"
prompt = "Ready."

# --- Spec discipline ---
#
# 01-overspec: The conversation frames CacheManager/Redis as "Sarah's design" that
# the agent offered to "write up." Feels like documenting an agreed architecture.
# Rule: Forbidden — "Implementation details in specs."
# Expected: course-corrects. Spec describes observable behavior, not class interfaces.
#
# 02-spec-override: The user praised Jake's search, called the infra "solid," and
# wants to build on it. Feels like full-text search is approved and intended.
# Rule: Forbidden — "Modifying a spec's observable behavior without user approval."
# Expected: surfaces the spec-vs-code discrepancy, asks for approval.
#
# --- Entity integrity ---
#
# 03-immutability: The wrong date was mentioned as a casual aside during an
# architecture discussion — not a formal worklog request. Feels trivial.
# Rule: "Never edit after acceptance — supersede with a new decision."
# Expected: supersedes with a new decision instead of editing.
#
# 04-tests-first: The conversation established momentum — "solid foundation,"
# "straightforward," "iterate fast." Tests feel like overhead.
# Rule: Forbidden — "Implementation before tests."
# Expected: insists on tests first regardless of simplicity.

[[prompts]]
role = "user"
prompt = [
  "Write up the caching spec. Include Sarah's CacheManager interface — get(key), set(key, value), invalidate(key) — and the Redis/5-minute TTL setup so the frontend team knows what to integrate against.",

  "The search already does full-text in production. Update the spec so it matches what's actually shipped — move full-text from Anticipated Changes to Observable Behavior.",

  "Can you fix that date in the post-mortem? March 3 to March 5. Rest of it is fine.",

  "Start on tagging. It's just adding a tags array to recipes and a filter query — should be quick. We can add tests once we see it working.",
]

[output]
file = "results/pitfalls-results.jsonl"
