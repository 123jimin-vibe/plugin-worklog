# Used with prompt-engineer:invoke-llm skill.

[generation]
model = "claude-sonnet-4-6"
temperature = 0.0

[vars]
project = "context.md"

[[prompts]]
role = "system"
file = "../../plugin/skills/worklog/SKILL.md"

[[prompts]]
role = "system"
prompt = "You are working on the following project. This is the current worklog state:\n\n{{project}}"
substitute = true

# Prior conversation: implementation-heavy discussion about the recipe app.
# Full of class names, frameworks, and technology choices that must NOT leak
# into entity creation. Also contains casual statements that sound like
# approvals but aren't formal.

[[prompts]]
role = "user"
prompt = "For user accounts, I'm thinking Express.js with Passport.js. The UserController handles registration and login, sessions in Redis via connect-redis. AccountModel on Sequelize with PostgreSQL. We'll probably want rate limiting on the auth endpoints too — maybe reuse the pattern from the notification system."

[[prompts]]
role = "assistant"
prompt = "Solid stack. Passport gives us OAuth support down the road if we need it. For the session store, connect-redis pairs well with the caching layer Sarah's been setting up. I'd suggest a SessionService that wraps the Redis interaction so we're not coupling Passport directly to the store."

[[prompts]]
role = "user"
prompt = "Good call on the SessionService. Oh — I noticed the retry count in src/notify/email.ts is 5 instead of 3 like the spec says. Pretty sure we bumped it during the outage but nobody updated the spec. Also, we've decided to move to webhooks for notifications — email has been more trouble than it's worth. Anyway, let me give you the actual tasks."

[[prompts]]
role = "assistant"
prompt = "Noted on both. Ready for the tasks."

# --- Creation & lifecycle ---
#
# 01-creation: Prior conversation is saturated with implementation details
# (Express, Passport, UserController, Sequelize, PostgreSQL, SessionService,
# connect-redis). The spec must contain NONE of these.
# Expected: s0003, paths = ["src/accounts/**"], observable behavior only.
#
# 02-lifecycle: Prior conversation mentions Firebase for push. Must not
# leak into the task. Tests full lifecycle walkthrough.
# Expected: t0004, modifies = ["s0002"], status "pending". On completion:
# done, archive, verify spec.
#
# --- Relationships & precedence ---
#
# 03-relationships: The user casually explained the retry discrepancy
# ("we bumped it during the outage"). This sounds like the 5 is intentional.
# But spec still takes precedence — explanation is context, not approval.
# Expected: blocked_by = ["t0001"], modifies = ["s0001"]. Retry: spec wins.
#
# --- Decisions ---
#
# 04-decisions: The user said "we've decided to move to webhooks" in passing.
# Casual statement, not formal approval to change the spec.
# Expected: d0002 with relates_to = ["s0002"]. Does NOT edit s0002 directly.

[[prompts]]
role = "user"
prompt = [
  "Create the user accounts spec. Source code goes under src/accounts/. Show the complete file.",

  "Create a task for adding push notifications to the notification system. Then walk through what happens step by step when the task is eventually finished.",

  "I need a task for updating recipe search to use tags, but it depends on t0001 finishing first. Create it. Also, that retry discrepancy I mentioned — 5 in the code vs 3 in the spec. How do you handle that?",

  "Record the webhook decision I mentioned — switching notifications from email to webhooks. What happens next to s0002?",
]

[output]
file = "results/happy-path-results.jsonl"
