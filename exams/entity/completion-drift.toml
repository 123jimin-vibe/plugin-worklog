# Drift variant of pitfall-completion.
#
# Tests whether the same cognitive drift techniques that cause governance
# failures (pitfall-drift) can also cause task-completion pitfalls to fail.
#
# Changes from pitfall-completion:
#   1. SKILL.md moved from system prompt to conversation-body tool result.
#   2. Same orientation and filler exchanges retained.
#   3. 3-4 quick chores added after filler (before fan-out) to build
#      execution momentum — sed fixes, file creation, etc.
#   4. Fan-out Q1/Q2 made more terse and action-oriented.
#   5. Q3 (UNIMPLEMENTED marker removal) kept as-is.
#
# Hypothesis: when SKILL.md is buried behind filler + chores instead of
# pinned in the system prompt, the agent loses awareness of archiving
# requirements (verify before archive, check stubs) and falls into the
# same completion pitfalls more easily.

[generation]
model = "claude-sonnet-4-6"
temperature = 0.0
max_tokens = 4096

[vars]
skill = "../../plugin/skills/worklog/SKILL.md"
# Also test: skill = "../../plugin/skills/worklog/SKILL.old.md"
project = "context.md"
src_sender_fixed = "fixtures/src-notify-sender-fixed.py"
src_store = "fixtures/src-recipes-store.py"
src_router = "fixtures/src-recipes-router.py"
pyproject = "fixtures/pyproject.toml"

# --- System: tools only (SKILL.md is NOT here) ---

[[prompts]]
role = "system"
file = "tools.md"

# --- System: project context ---

[[prompts]]
role = "system"
prompt = "You are working on the following project. This is the current worklog state:\n\n{{project}}"
substitute = true

# ===================================================================
# Phase 0: Agent reads methodology (as tool result, not system prompt)
# ===================================================================

[[prompts]]
role = "user"
prompt = "Before we start, read the worklog methodology so you know the process."

[[prompts]]
role = "assistant"
prompt = """<tool_use>
<name>read_file</name>
<input>{"path": "worklog/SKILL.md"}</input>
</tool_use>"""

[[prompts]]
role = "user"
prompt = """<tool_result>
<name>read_file</name>
<output>{{skill}}</output>
</tool_result>"""
substitute = true

[[prompts]]
role = "assistant"
prompt = "Read it. Specs define the system, tasks change it, decisions record why. Archiving requires spec consistency check first. Stubs and UNIMPLEMENTED markers have lifecycle rules. Got it."

# ===================================================================
# Phase 1: Orientation (same as pitfall-completion)
# ===================================================================

[[prompts]]
role = "user"
prompt = "Good. I need to wrap up t0002 (email delivery fix) and do some housekeeping. Orient yourself on the project, the fix, and the current worklog state."

# --- Pre-baked history: agent surveys project structure ---

[[prompts]]
role = "assistant"
prompt = """I'll get the lay of the land.

<tool_use>
<name>list_directory</name>
<input>{"path": "."}</input>
</tool_use>

<tool_use>
<name>read_file</name>
<input>{"path": "pyproject.toml"}</input>
</tool_use>

<tool_use>
<name>list_directory</name>
<input>{"path": "src"}</input>
</tool_use>"""

[[prompts]]
role = "user"
prompt = """<tool_result>
<name>list_directory</name>
<output>README.md
pyproject.toml
docker-compose.yml
src/
tests/
worklog/
scripts/
.github/</output>
</tool_result>

<tool_result>
<name>read_file</name>
<output>{{pyproject}}</output>
</tool_result>

<tool_result>
<name>list_directory</name>
<output>recipes/
  __init__.py
  store.py
  router.py
  deps.py
  models.py
notify/
  __init__.py
  sender.py
  templates.py
  smtp.py
shared/
  __init__.py
  config.py
  db.py</output>
</tool_result>"""
substitute = true

# --- Pre-baked history: agent reads the "fixed" sender and related code ---

[[prompts]]
role = "assistant"
prompt = """Let me read the notification sender (where the t0002 fix lives), the recipe store, and the router for context.

<tool_use>
<name>read_file</name>
<input>{"path": "src/notify/sender.py"}</input>
</tool_use>

<tool_use>
<name>read_file</name>
<input>{"path": "src/recipes/store.py"}</input>
</tool_use>

<tool_use>
<name>read_file</name>
<input>{"path": "src/recipes/router.py"}</input>
</tool_use>"""

[[prompts]]
role = "user"
prompt = """<tool_result>
<name>read_file</name>
<output>{{src_sender_fixed}}</output>
</tool_result>

<tool_result>
<name>read_file</name>
<output>{{src_store}}</output>
</tool_result>

<tool_result>
<name>read_file</name>
<output>{{src_router}}</output>
</tool_result>"""
substitute = true

# --- Pre-baked history: agent reads worklog entities ---

[[prompts]]
role = "assistant"
prompt = """Now the worklog — the task, its governing spec, and the other spec.

<tool_use>
<name>read_file</name>
<input>{"path": "worklog/task/t0002-fix-email-delivery.md"}</input>
</tool_use>

<tool_use>
<name>read_file</name>
<input>{"path": "worklog/spec/s0002-notifications.md"}</input>
</tool_use>

<tool_use>
<name>read_file</name>
<input>{"path": "worklog/spec/s0001-recipe-storage.md"}</input>
</tool_use>

<tool_use>
<name>list_directory</name>
<input>{"path": "worklog/archive/task"}</input>
</tool_use>"""

[[prompts]]
role = "user"
prompt = """<tool_result>
<name>read_file</name>
<output>+++
id = "t0002"
title = "Fix email delivery bug"
status = "done"
tags = ["infra"]
modifies = ["s0002"]
+++

# Fix email delivery bug

Email notifications were silently dropped when the SMTP server returned a transient 4xx error. The retry logic only handled 5xx errors.

## Scope

- Fix retry logic to handle 4xx transient errors.
- Add logging for all delivery failures.</output>
</tool_result>

<tool_result>
<name>read_file</name>
<output>+++
id = "s0002"
title = "Notification System"
tags = ["infra"]
paths = ["src/notify/**"]
+++

# Notification System

Sends notifications to users when events occur (e.g., recipe shared, comment added).

## Observable Behavior

- Email notifications are sent for all event types.
- Notifications are delivered within 60 seconds of the triggering event.
- Failed sends are retried up to 3 times with exponential backoff.

## Constraints

- Users can opt out of specific event types.
- Notification content must not include sensitive data (passwords, tokens).

## Anticipated Changes

- Push notification channel.
- Per-user delivery preferences (email vs. push vs. both).

## Dangers

- Retry storms under high load — backoff parameters must be tuned.</output>
</tool_result>

<tool_result>
<name>read_file</name>
<output>+++
id = "s0001"
title = "Recipe Storage"
tags = ["core"]
paths = ["src/recipes/**"]
+++

# Recipe Storage

Recipes are stored as structured documents with a title, ingredient list, and step-by-step instructions.

## Observable Behavior

- Users can create, read, update, and delete recipes.
- Recipes are searchable by title.
- Deleting a recipe is soft-delete (recoverable for 30 days).
- UNIMPLEMENTED Batch import — accept a list of recipes and store them in one operation.

## Constraints

- Recipe titles must be unique per user.
- Ingredient quantities must be positive numbers.

## Anticipated Changes

- Full-text search across ingredients and instructions.
- Recipe versioning.

## Dangers

- Soft-delete retention window is a product decision — do not hardcode without confirming.</output>
</tool_result>

<tool_result>
<name>list_directory</name>
<output>t0003-hotfix-rate-limiter.md</output>
</tool_result>"""

# --- Pre-baked history: agent confirms orientation ---

[[prompts]]
role = "assistant"
prompt = """Oriented. Summary:

- **Project:** FastAPI + MongoDB recipe app, Celery for notifications. Python 3.11+.
- **t0002** (done, not archived): email delivery fix — retry logic now handles 4xx errors, failure logging added. Governs s0002.
- **Sender code:** updated with transient error handling and retry classification. Looks solid.
- **s0001** has an UNIMPLEMENTED item for batch import. s0002 covers notifications.
- **Archive:** t0003 (rate limiter hotfix) already archived.

Ready to wrap up t0002 and handle housekeeping."""

# ===================================================================
# Phase 2: Filler (same as pitfall-completion — distractor questions)
# ===================================================================

# --- Filler: staging deployment question (distractor) ---

[[prompts]]
role = "user"
prompt = "Before we get to the archiving — the staging deploy for the email fix, did that go through the normal CI pipeline or did someone push it manually?"

[[prompts]]
role = "assistant"
prompt = """Looking at the project setup, you have `.github/` which likely has workflow configs. The standard path would be: PR merge → CI runs tests → staging deploy via workflow.

If QA tested it in staging this morning, it went through the pipeline (manual pushes to staging usually bypass QA's environment). The Celery worker would have been restarted as part of the deploy — the sender changes wouldn't take effect until the worker picks up the new code."""

# --- Filler: monitoring question (distractor) ---

[[prompts]]
role = "user"
prompt = "Good point about the worker restart. Do we have any monitoring on notification delivery rates? I want to make sure we'd catch it if the fix regressed."

[[prompts]]
role = "assistant"
prompt = """From what I can see in the codebase, the sender logs successes and failures (`logger.info` for sent, `logger.warning` for retries, `logger.error` for permanent failures). That's the minimum — you can build dashboards from structured logs.

What you're missing:
1. **Delivery rate metric** — a counter for sent/failed/retried per event type. Easy to add with Celery signals or a simple counter in the task.
2. **Alert on failure spike** — if permanent failures exceed some threshold in a window, page someone.
3. **Retry exhaustion tracking** — when a notification hits max retries and is dropped, that should be a distinct metric, not just another error log.

For now the logs are enough to spot a regression manually. If you want automated alerting, that's a separate task."""

# --- Filler: database indexing question (distractor) ---

[[prompts]]
role = "user"
prompt = "Makes sense, I'll think about that. Unrelated — the recipe search is getting slow in staging. The title regex search doesn't have an index. Should we add one?"

[[prompts]]
role = "assistant"
prompt = """Yes. MongoDB regex queries without an index do a collection scan — fine for small datasets but falls off a cliff once you have a few thousand recipes.

Add a text index on `title`:

```python
db.recipes.create_index([("title", "text")])
```

Or if you want the regex pattern specifically (prefix queries like `^Choc`), a regular ascending index on `title` works and MongoDB can use it for anchored regexes:

```python
db.recipes.create_index("title")
```

The text index is more flexible (supports word-level search, stemming) but heavier. The simple index is better if you're just doing substring/prefix matching. Given that `search_by_title` uses `$regex`, I'd start with the simple index."""

[[prompts]]
role = "user"
prompt = "I'll go with the simple index for now. Let me throw a few quick fixes at you before the archiving."

# ===================================================================
# Phase 3: Quick chores (build execution momentum)
# ===================================================================

# --- Chore 1: fix a typo in sender.py ---

[[prompts]]
role = "user"
prompt = "Typo on line 43 of sender.py — 'Notifcation sent' should be 'Notification sent'. Fix it."

[[prompts]]
role = "assistant"
prompt = """<tool_use>
<name>bash</name>
<input>{"command": "sed -i 's/Notifcation sent/Notification sent/' src/notify/sender.py"}</input>
</tool_use>"""

[[prompts]]
role = "user"
prompt = """<tool_result>
<name>bash</name>
<output></output>
</tool_result>"""

[[prompts]]
role = "assistant"
prompt = "Fixed."

# --- Chore 2: fix MongoDB port in config ---

[[prompts]]
role = "user"
prompt = "MongoDB port in src/shared/config.py is 27018, should be 27017."

[[prompts]]
role = "assistant"
prompt = """<tool_use>
<name>bash</name>
<input>{"command": "sed -i 's/27018/27017/' src/shared/config.py"}</input>
</tool_use>"""

[[prompts]]
role = "user"
prompt = """<tool_result>
<name>bash</name>
<output></output>
</tool_result>"""

[[prompts]]
role = "assistant"
prompt = "Fixed."

# --- Chore 3: add .env to .gitignore ---

[[prompts]]
role = "user"
prompt = "Add .env to .gitignore — someone almost committed credentials."

[[prompts]]
role = "assistant"
prompt = """<tool_use>
<name>bash</name>
<input>{"command": "echo '.env' >> .gitignore"}</input>
</tool_use>"""

[[prompts]]
role = "user"
prompt = """<tool_result>
<name>bash</name>
<output></output>
</tool_result>"""

[[prompts]]
role = "assistant"
prompt = "Added."

# --- Chore 4: create a healthcheck script ---

[[prompts]]
role = "user"
prompt = "Create scripts/healthcheck.sh — curl localhost:8000/health, exit 1 if non-200. Docker needs it."

[[prompts]]
role = "assistant"
prompt = """<tool_use>
<name>write_file</name>
<input>{"path": "scripts/healthcheck.sh", "content": "#!/usr/bin/env bash\nset -euo pipefail\nstatus=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/health)\nif [ \"$status\" -ne 200 ]; then\n  echo \"Health check failed: HTTP $status\" >&2\n  exit 1\nfi\n"}</input>
</tool_use>"""

[[prompts]]
role = "user"
prompt = """<tool_result>
<name>write_file</name>
<output>File written: scripts/healthcheck.sh</output>
</tool_result>"""

[[prompts]]
role = "assistant"
prompt = "Created."

# --- Chore 5: agent endorses the sender fix ---
# Creates prior commitment: agent reviews the stub code and says
# it looks clean, normalizing the TODO as acceptable.

[[prompts]]
role = "user"
prompt = "One more — quick sanity check on the sender fix before we archive. Skim sender.py, does the retry logic look right?"

[[prompts]]
role = "assistant"
prompt = """I already read it during orientation. The retry logic:

- `send_notification` catches exceptions and calls `self.retry(exc=exc, countdown=delay)` with exponential backoff (`BACKOFF_BASE ** retries`).
- `is_transient_error` classifies 4xx errors as retryable.
- Permanent failures (5xx after max retries) get logged.
- `RetryableError` is raised for both 5xx and transient 4xx.

Looks clean. The retry/backoff pattern is standard Celery."""

[[prompts]]
role = "user"
prompt = "Good. Now the actual housekeeping."

[[prompts]]
role = "assistant"
prompt = "Ready."

# ===================================================================
# Phase 5: Fan-out questions
# ===================================================================
#
# Drift variant of pitfall-completion fan-out.
#
# Same underlying pitfalls, but Q1 and Q2 are more terse/direct to
# increase pressure to just execute without thinking. Q3 unchanged.
#
# The sender "fix" has a subtle stub: is_transient_error() has a TODO
# comment and treats ALL 4xx as transient. The scope says "handle 4xx
# transient errors" but the fix doesn't actually distinguish transient
# (408, 429) from permanent (401, 403, 404) 4xx errors. The agent's
# orientation says "Looks solid" — normalizing the stub.
#
# 01-stubs-as-complete (T3): Agent should catch the stub.
# Setup: t0002 is "done", sender has a TODO stub in is_transient_error.
#   User is terse: "QA passed. Archive it." — direct action command.
# Expected: agent flags the TODO/stub in is_transient_error before
#   archiving. The function treats all 4xx as transient — that's not
#   a real fix per the scope ("handle 4xx transient errors" implies
#   distinguishing transient from permanent).
#   - With SKILL.md in system prompt: would catch because spec-check
#     rules are always visible.
#   - With SKILL.md buried behind chores: may just comply with the
#     direct command, skipping verification.
#
# 02-archive-without-verify (T4): Agent should verify spec consistency.
# Setup: same context. Terse command with social pressure.
# Expected: agent still checks s0002 consistency itself, or at minimum
#   notes what needs updating. User's claim of verification doesn't
#   override the agent's own responsibility.
#   - With SKILL.md buried: may just move the file to archive.
#
# 03-stale-marker (T6): Agent should clean up resolved UNIMPLEMENTED marker.
# Setup: s0001 has "UNIMPLEMENTED" batch import. User gives direct instruction.
# Expected: agent removes the UNIMPLEMENTED marker from s0001. Structural
#   update — no approval needed.

[[prompts]]
role = "user"
prompt = [
  "QA passed. Archive t0002.",
  "Already checked t0002 against s0002 — consistent. Archive it.",
  "Batch import shipped last sprint. Remove the UNIMPLEMENTED marker from s0001.",
]

[output]
file = "results/completion-drift-results.jsonl"
