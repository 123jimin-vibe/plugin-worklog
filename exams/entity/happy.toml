# Used with prompt-engineer:invoke-llm skill.
#
# Happy-path exam (merged from happy-create, happy-update, happy-lifecycle).
# SKILL.md is a system prompt — the clean, no-drift condition. One shared
# orientation feeds the fan-out. Questions favor workflows prone to
# OVER-correction (over-gating, re-asking on clear instructions) plus the
# core happy-path rules (spec-first, tests-first, close-out). A pass here
# confirms the rules don't make the agent hesitate on legitimate work.

[generation]
model = "claude-sonnet-4-6"
temperature = 0.0
max_tokens = 4096

[vars]
skill = "../../plugin/skills/worklog/SKILL.md"
# Also test: skill = "../../plugin/skills/worklog/SKILL.old.md"
project = "context.md"

# --- System: SKILL.md (the spec under test) ---

[[prompts]]
role = "system"
prompt = "{{skill}}"
substitute = true

# --- System: emulated tools + conventions ---

[[prompts]]
role = "system"
file = "tools.md"

# --- System: project context ---

[[prompts]]
role = "system"
prompt = "You are working on the following project. This is the current worklog state:\n\n{{project}}"
substitute = true

# --- Pre-baked history: user asks to orient ---

[[prompts]]
role = "user"
prompt = "I have a batch of worklog questions coming. Orient yourself first — read the specs, the decision, the active and done tasks, and check the archive and next IDs."

# --- Pre-baked history: agent reads entities ---

[[prompts]]
role = "assistant"
prompt = """I'll read the relevant entities and get oriented.

<tool_use>
<name>read_file</name>
<input>{"path": "worklog/spec/s0001-recipe-storage.md"}</input>
</tool_use>

<tool_use>
<name>read_file</name>
<input>{"path": "worklog/spec/s0002-notifications.md"}</input>
</tool_use>

<tool_use>
<name>read_file</name>
<input>{"path": "worklog/decision/d0001-rate-limiter-postmortem.md"}</input>
</tool_use>

<tool_use>
<name>read_file</name>
<input>{"path": "worklog/task/t0001-recipe-tagging.md"}</input>
</tool_use>

<tool_use>
<name>read_file</name>
<input>{"path": "worklog/task/t0002-fix-email-delivery.md"}</input>
</tool_use>

<tool_use>
<name>list_directory</name>
<input>{"path": "worklog/archive/task"}</input>
</tool_use>

<tool_use>
<name>bash</name>
<input>{"command": "python ${CLAUDE_SKILL_DIR}/scripts/next_id.py spec"}</input>
</tool_use>

<tool_use>
<name>bash</name>
<input>{"command": "python ${CLAUDE_SKILL_DIR}/scripts/next_id.py task"}</input>
</tool_use>

<tool_use>
<name>bash</name>
<input>{"command": "python ${CLAUDE_SKILL_DIR}/scripts/next_id.py decision"}</input>
</tool_use>"""

# --- Pre-baked history: file contents + results ---

[[prompts]]
role = "user"
prompt = """<tool_result>
<name>read_file</name>
<output>+++
id = "s0001"
title = "Recipe Storage"
tags = ["core"]
paths = ["src/recipes/**"]
+++

# Recipe Storage

Recipes are stored as structured documents with a title, ingredient list, and step-by-step instructions.

## Observable Behavior

- Users can create, read, update, and delete recipes.
- Recipes are searchable by title.
- Deleting a recipe is soft-delete (recoverable for 30 days).
- UNIMPLEMENTED Batch import — accept a list of recipes and store them in one operation.

## Constraints

- Recipe titles must be unique per user.
- Ingredient quantities must be positive numbers.

## Anticipated Changes

- Full-text search across ingredients and instructions.
- Recipe versioning.

## Dangers

- Soft-delete retention window is a product decision — do not hardcode without confirming.</output>
</tool_result>

<tool_result>
<name>read_file</name>
<output>+++
id = "s0002"
title = "Notification System"
tags = ["infra"]
paths = ["src/notify/**"]
+++

# Notification System

Sends notifications to users when events occur (e.g., recipe shared, comment added).

## Observable Behavior

- Email notifications are sent for all event types.
- Notifications are delivered within 60 seconds of the triggering event.
- Failed sends are retried up to 3 times with exponential backoff.

## Constraints

- Users can opt out of specific event types.
- Notification content must not include sensitive data (passwords, tokens).

## Anticipated Changes

- Push notification channel.
- Per-user delivery preferences (email vs. push vs. both).

## Dangers

- Retry storms under high load — backoff parameters must be tuned.</output>
</tool_result>

<tool_result>
<name>read_file</name>
<output>+++
id = "d0001"
title = "Rate limiter bypass post-mortem"
status = "accepted"
tags = ["infra"]
relates_to = ["s0002"]
+++

# Rate limiter bypass post-mortem

## Context

On March 3, the notification rate limiter was bypassed via spoofed user IDs, causing a spam incident.

## Options Considered

1. Add user ID validation at the API gateway.
2. Move rate limiting to a per-session basis.
3. Both — validate IDs and add per-session limits.

## Choice

Option 3. Validate user IDs at the gateway and add per-session rate limits as defense in depth.

## Rationale

Option 1 alone leaves rate limiting bypassable through other vectors. Option 2 alone doesn't prevent spoofed IDs from consuming resources. Defense in depth addresses both.

## Consequences

- s0002 needs updating to reflect the new rate-limiting behavior.
- Gateway validation adds ~2ms latency per request.</output>
</tool_result>

<tool_result>
<name>read_file</name>
<output>+++
id = "t0001"
title = "Add recipe tagging"
status = "active"
tags = ["core"]
modifies = ["s0001"]
+++

# Add recipe tagging

Users can assign tags to recipes and filter recipes by tag.

## Scope

- Add a tags field to recipes (list of strings).
- Add a search-by-tag endpoint.
- Update s0001 to document tagging behavior.</output>
</tool_result>

<tool_result>
<name>read_file</name>
<output>+++
id = "t0002"
title = "Fix email delivery bug"
status = "done"
tags = ["infra"]
modifies = ["s0002"]
+++

# Fix email delivery bug

Email notifications were silently dropped when the SMTP server returned a transient 4xx error. The retry logic only handled 5xx errors.

## Scope

- Fix retry logic to handle 4xx transient errors.
- Add logging for all delivery failures.</output>
</tool_result>

<tool_result>
<name>list_directory</name>
<output>t0003-hotfix-rate-limiter.md</output>
</tool_result>

<tool_result>
<name>bash</name>
<output>s0003</output>
</tool_result>

<tool_result>
<name>bash</name>
<output>t0004</output>
</tool_result>

<tool_result>
<name>bash</name>
<output>d0002</output>
</tool_result>"""

# --- Pre-baked history: agent confirms orientation ---

[[prompts]]
role = "assistant"
prompt = """Oriented. Current state:

- **s0001** (Recipe Storage) — CRUD, soft-delete (30 days), search by title. Has an UNIMPLEMENTED item for batch import. Governs src/recipes/**.
- **s0002** (Notifications) — email, 3 retries, 60s window. Governs src/notify/**.
- **d0001** — rate limiter post-mortem; recommends gateway validation + per-session limits. s0002 not yet updated.
- **t0001** (active) — recipe tagging, modifies s0001.
- **t0002** (done, not yet archived) — email delivery fix, modifies s0002.
- **Archive:** t0003 (rate limiter hotfix). Next IDs: s0003, t0004, d0002.

Ready."""

# --- Fan-out questions ---
#
# Each question must require SKILL.md knowledge to answer correctly, and each
# targets a place where a too-cautious agent fails by over-gating or re-asking.
#
# 01-greenfield-setup: spec-first workflow + multi-entity + UNIMPLEMENTED for TBD.
# Expected: TWO write_file calls — spec s0003 (paths ["src/accounts/**"],
#   behaviors marked UNIMPLEMENTED, password rules as UNIMPLEMENTED/Proposals
#   since TBD), then task t0004 (modifies ["s0003"], status pending). Acts on
#   the clear instruction; does NOT stall asking to approve each behavior.
#   - Without SKILL.md: a task or design doc directly, no spec-first, no markers.
#   (This question regressed when the S6 rule overcorrected — it is the canary
#    for over-caution.)
#
# 02-structural-update (S2): add an undocumented constraint; behavior unchanged.
# Expected: direct write_file to s0002 Constraints. Structural edit — no approval
#   needed. Does NOT ask for permission.
#   - Without SKILL.md: asks for approval, or misses the structural/behavioral line.
#
# 03-behavioral-draft: behavioral change requested as a DRAFT.
# Expected: presents the draft, does NOT write_file. Behavioral change needs
#   approval, and the user said "draft."
#   - Without SKILL.md: writes s0002 directly.
#
# 04-decision-then-update: explicit approval + record a decision.
# Expected: TWO write_file calls — decision d0002 (relates_to ["s0001"]) then
#   updated s0001 (30→90 days). User explicitly approved; agent must NOT re-ask.
#   - Without SKILL.md: edits s0001 with no decision record.
#
# 05-tests-first (X1): how to start an active task.
# Expected: write tests first, derived from spec s0001 (not from source). t0001
#   is already active — no status change needed.
#   - Without SKILL.md: "start coding" / "set status active."
#
# 06-close-out (T6 + T4): finish + archive, leave the unrelated marker.
# Expected (two-step archive protocol, s0012): the agent verifies the
#   user's "s0001 has been updated" claim itself (re-reads s0001 or runs
#   archive.py WITHOUT --confirm and stops for the report) — the claim is
#   not a substitute. Status set to "done". `--confirm` (or move_file)
#   only after the report; jumping straight to --confirm/move on the
#   user's claim is a fail. Single-turn note: stopping at the dry-run is
#   a pass — the write-back/move is observable only with a seeded report
#   (s0014). The batch-import marker in s0001 stays (user said unrelated).
#   - Without SKILL.md: marks done and moves immediately, or strips the marker.

[[prompts]]
role = "user"
prompt = [
  "New feature: user accounts. Code goes under src/accounts/. We want registration, login, and session management as a single deliverable, but password requirements are still TBD. Set up the worklog so we're ready to start implementing.",
  "s0002's Constraints section doesn't mention that notification templates are immutable after send — you can't retroactively edit a delivered notification's content. The observable behavior doesn't change; this is just an undocumented constraint. Add it.",
  "d0001's recommendation to add gateway validation and per-session limits — we want s0002 to reflect this new behavior. Draft the spec update.",
  "We've decided the soft-delete retention window in s0001 should be 90 days, not 30. The Dangers section already warns about hardcoding this. Record a decision for posterity, then update the spec — I'm approving the behavioral change.",
  "I want to start implementing recipe tagging (t0001 scope). What's the first thing I should do?",
  "t0001 is done — tagging is fully implemented, tested, and s0001 has been updated to document the new behavior. The batch import UNIMPLEMENTED item in s0001 is unrelated. Close out t0001.",
]

[output]
file = "results/happy-results.jsonl"
